<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sample TAM Admin Console</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="app-frame">
    <header class="app-header">Sample TAM Admin Console</header>
    <div class="app-body">
      <nav class="sidebar">
        <button id="btn-devices" class="nav-btn active">Show Devices</button>
        <button id="btn-manifests" class="nav-btn">Show TCs</button>
        <button id="btn-upload" class="nav-btn">Upload Manifests</button>
      </nav>
      <main class="content">
        <section id="view-devices" class="view visible">
          <div class="card">
            <p class="kicker">Show Devices</p>
            <h2>Devices</h2>
            <div class="devices-layout">
              <div class="table-wrap">
                <table class="table">
                  <thead>
                      <tr>
                      <th>Device Name</th>
                      <th>Last Update</th>
                      </tr>
                  </thead>
                  <tbody id="devices-body"></tbody>
                </table>
              </div>
              <aside id="device-detail-panel" class="device-detail-panel">
                <h3 id="device-detail-title">Device Details</h3>
                <div class="table-wrap">
                  <table class="table">
                    <thead>
                      <tr>
                        <th>Wapp Name</th>
                        <th>Version</th>
                      </tr>
                    </thead>
                    <tbody id="device-detail-body"></tbody>
                  </table>
                </div>
              </aside>
            </div>
          </div>
        </section>

        <section id="view-manifests" class="view">
          <div class="card">
            <p class="kicker">Show TCs</p>
            <h2>TCs</h2>
            <div class="table-wrap">
              <table class="table">
                <thead>
                  <tr>
                    <th>TC Name</th>
                    <th>Version</th>
                  </tr>
                </thead>
                <tbody id="manifests-body"></tbody>
              </table>
            </div>
          </div>
        </section>

        <section id="view-upload" class="view">
          <div class="card">
            <p class="kicker">Upload Manifests</p>
            <h2>Upload</h2>
            <form id="upload-form">
              <div class="form-group">
                <label>File: <input type="file" name="file" required /></label>
              </div>
              <br/>
              <button type="submit">Upload</button>
              <div id="upload-status"></div>
            </form>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
